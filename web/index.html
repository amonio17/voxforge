<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VoxForge AI - MAX QUALITY</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
    padding: 30px;
}

textarea {
    width: 80%;
    height: 120px;
    font-size: 16px;
}

button {
    padding: 10px 20px;
    margin-top: 10px;
    cursor: pointer;
}

.card {
    background: #1e293b;
    padding: 20px;
    margin: 20px auto;
    width: 80%;
    border-radius: 10px;
}
</style>
</head>

<body>

<h1>🎤 VoxForge MAX QUALITY</h1>

<div class="card">

<textarea id="text" placeholder="Write text here..."></textarea>

<br><br>

<select id="lang">
    <option value="en">English</option>
    <option value="fr">French</option>
</select>

<br><br>

<input type="file" id="audioFile" accept="audio/*">

<br><br>

<audio id="preview" controls></audio>

<br><br>

<button onclick="generate()">🚀 GENERATE VOICE</button>

<p id="status"></p>

</div>

<div class="card">
<h3>Result</h3>
<audio id="result" controls></audio>
<br><br>
<a id="download"><button>⬇ Download</button></a>
</div>

<script>

let file = null;

document.getElementById("audioFile").addEventListener("change", (e) => {
    file = e.target.files[0];
    document.getElementById("preview").src = URL.createObjectURL(file);
});

function setStatus(t){
    document.getElementById("status").innerText = t;
}

async function generate(){

    if(!file){
        alert("Upload voice first");
        return;
    }

    const text = document.getElementById("text").value;
    const lang = document.getElementById("lang").value;

    setStatus("⏳ Generating high quality voice...");

    let form = new FormData();
    form.append("text", text);
    form.append("speaker_wav", file);
    form.append("language", lang);

    const res = await fetch("/clone", {
        method: "POST",
        body: form
    });

    const data = await res.json();

    setStatus("✅ Done");

    document.getElementById("result").src = data.audio_url;
    document.getElementById("download").href = data.audio_url;
}

</script>

</body>
</html>
