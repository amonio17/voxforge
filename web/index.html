<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>VoxForge</title>
</head>
<body>

<h2>Voice Cloning</h2>

<textarea id="text" placeholder="Écris ton texte"></textarea>
<br><br>

<input type="file" id="audioFile" accept="audio/*">
<br><br>

<p>Preview :</p>
<audio id="preview" controls></audio>

<br><br>

<button onclick="generate()">Générer la voix</button>

<h3>Résultat :</h3>
<audio id="result" controls></audio>

<script>
let file = null;

// preview audio
document.getElementById("audioFile").addEventListener("change", (e) => {
    file = e.target.files[0];
    document.getElementById("preview").src = URL.createObjectURL(file);
});

// generate
async function generate() {

    if (!file) {
        alert("Upload audio");
        return;
    }

    const text = document.getElementById("text").value;

    if (!text) {
        alert("Écris un texte");
        return;
    }

    const formData = new FormData();
    formData.append("text", text);
    formData.append("speaker_wav", file);

    try {
        const res = await fetch("http://127.0.0.1:8000/clone", {
            method: "POST",
            body: formData
        });

        const data = await res.json();

        console.log(data);

        if (data.audio_url) {
            document.getElementById("result").src = data.audio_url;
        } else {
            alert("Erreur génération audio");
        }

    } catch (err) {
        alert("Serveur non connecté");
        console.error(err);
    }
}
</script>

</body>
</html>
