<!DOCTYPE html>
<html>
<head>
    <title>VoxForge</title>
</head>
<body>

<h1>VoxForge Voice Clone</h1>

<textarea id="text" placeholder="Écris ton texte"></textarea>

<br><br>

<input type="file" id="audioFile" accept="audio/*">

<br><br>

<p>Preview :</p>
<audio id="preview" controls></audio>

<br><br>

<button onclick="generate()">Générer</button>

<h3>Résultat :</h3>
<audio id="result" controls></audio>

<script>
let file = null;

document.getElementById("audioFile").addEventListener("change", (e) => {
    file = e.target.files[0];
    document.getElementById("preview").src = URL.createObjectURL(file);
});

async function generate() {
    if (!file) {
        alert("Upload audio");
        return;
    }

    const text = document.getElementById("text").value;

    let formData = new FormData();
    formData.append("text", text);
    formData.append("speaker_wav", file);

    const res = await fetch("http://127.0.0.1:8000/clone", {
        method: "POST",
        body: formData
    });

    const data = await res.json();

    document.getElementById("result").src = data.audio_url;
}
</script>

</body>
</html>
